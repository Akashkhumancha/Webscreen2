<!DOCTYPE html>
<html>
<head>
    <title>WebScreen Lite Pro Viewer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        h1 { margin-bottom: 5px; color: #f1f1f1; }
        #status { 
            margin: 15px; 
            padding: 10px 20px; 
            font-weight: bold; 
            color: #ff9800; 
            background: #1e1e1e;
            display: inline-block;
            border-radius: 30px;
            border: 1px solid #333;
        }
        video { 
            width: 100%; 
            max-width: 800px; 
            min-height: 450px; 
            background: #000; 
            border: 2px solid #444;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn { 
            border: none; 
            padding: 15px 35px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1em;
            font-weight: bold;
            margin: 10px;
            transition: background 0.3s;
        }
        .btn-start { background: #4CAF50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .btn-unmute { background: #2196F3; color: white; }
    </style>
</head>
<body>

    <h1>WebScreen Lite</h1>
    <div id="status">REDMI STATUS: IDLE</div>
    
    <br>
    <video id="remoteVideo" autoplay playsinline></video>
    <br>

    <div class="controls">
        <button class="btn btn-start" onclick="trigger('START_STREAM')">START MONITORING</button>
        <button class="btn btn-stop" onclick="trigger('STOP_STREAM')">STOP MONITORING</button>
        <button class="btn btn-unmute" onclick="document.getElementById('remoteVideo').muted = false">UNMUTE AUDIO</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCR--mIMXA96W4CtXPq1KxYptWhKNan5Dg",
            authDomain: "webscreenlite.firebaseapp.com",
            projectId: "webscreenlite",
            storageBucket: "webscreenlite.firebasestorage.app",
            messagingSenderId: "486527120453",
            appId: "1:486527120453:web:e24b8e882b8ec7807d5f2c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const sessionId = "test_session_123";
        const sessionRef = doc(db, "sessions", sessionId);

        let pc = null;
        let remoteSet = false;
        const buffer = [];

        function initPeerConnection() {
            if (pc) pc.close();
            remoteSet = false;
            buffer.length = 0;

            // Updated ICE Servers for better Mobile Data traversal
            pc = new RTCPeerConnection({
                iceServers: [
                    { urls: "stun:stun.l.google.com:19302" },
                    { urls: "stun:stun1.l.google.com:19302" },
                    { 
                        urls: "turn:openrelay.metered.ca:443?transport=tcp", 
                        username: "openrelayproject", 
                        credential: "openrelayproject" 
                    },
                    { 
                        urls: "turn:openrelay.metered.ca:80", 
                        username: "openrelayproject", 
                        credential: "openrelayproject" 
                    }
                ],
                iceCandidatePoolSize: 10
            });

            pc.ontrack = (e) => {
                const video = document.getElementById('remoteVideo');
                if (e.streams && e.streams[0]) {
                    video.srcObject = e.streams[0];
                }
                document.getElementById('status').innerText = "STREAMING LIVE";
                document.getElementById('status').style.color = "#4CAF50";
            };

            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    addDoc(collection(db, "sessions", sessionId, "candidates"), {
                        candidate: e.candidate.candidate, 
                        sdpMid: e.candidate.sdpMid, 
                        sdpMLineIndex: e.candidate.sdpMLineIndex, 
                        origin: "web"
                    });
                }
            };

            pc.oniceconnectionstatechange = () => {
                const state = pc.iceConnectionState;
                const statusEl = document.getElementById('status');
                statusEl.innerText = "ICE: " + state.toUpperCase();
                
                if (state === "failed" || state === "disconnected") {
                    statusEl.style.color = "#f44336";
                } else if (state === "connected" || state === "completed") {
                    statusEl.style.color = "#4CAF50";
                }
            };
        }

        window.trigger = async (cmd) => {
            const statusBox = document.getElementById('status');
            if (cmd === 'START_STREAM') {
                statusBox.innerText = "WAKING REDMI...";
                initPeerConnection();
                // We clear signaling fields to force a fresh handshake
                await updateDoc(sessionRef, { 
                    command: cmd, 
                    offer: null, 
                    answer: null 
                });
            } else {
                statusBox.innerText = "STOPPING...";
                await updateDoc(sessionRef, { command: cmd });
                if(pc) pc.close();
                document.getElementById('remoteVideo').srcObject = null;
            }
        };

        onSnapshot(sessionRef, async (snap) => {
            const data = snap.data();
            
            if (data?.command === "IDLE") {
                document.getElementById('status').innerText = "REDMI STATUS: IDLE";
                document.getElementById('status').style.color = "#ff9800";
            }

            if (data?.offer && pc && !pc.currentRemoteDescription) {
                console.log("Offer received from Android");
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await updateDoc(sessionRef, { answer: { type: 'answer', sdp: answer.sdp } });
                
                remoteSet = true;
                // Process buffered candidates
                while(buffer.length > 0) {
                    const cand = buffer.shift();
                    await pc.addIceCandidate(new RTCIceCandidate(cand)).catch(e => console.warn(e));
                }
            }
        });

        // Listen for candidates from Android
        onSnapshot(query(collection(db, "sessions", sessionId, "candidates"), where("origin", "==", "android")), (snap) => {
            snap.docChanges().forEach(change => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    const candidateInit = {
                        candidate: data.candidate,
                        sdpMid: data.sdpMid,
                        sdpMLineIndex: data.sdpMLineIndex
                    };

                    if (!remoteSet) {
                        buffer.push(candidateInit);
                    } else {
                        pc.addIceCandidate(new RTCIceCandidate(candidateInit)).catch(e => console.warn(e));
                    }
                }
            });
        });

        initPeerConnection();
    </script>
</body>
</html>
