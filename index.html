<!DOCTYPE html>
<html>
<head>
    <title>WebScreen Lite Viewer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 800px; min-height: 450px; background: #000; border: 2px solid #333; border-radius: 12px; }
        .btn { padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 10px; border: none; }
        #status { color: #ff9800; font-weight: bold; margin: 15px; padding: 10px; background: #1e1e1e; display: inline-block; border-radius: 20px; }
    </style>
</head>
<body>
    <h1>WebScreen Lite</h1>
    <div id="status">REDMI STATUS: IDLE</div>
    <br>
    <video id="remoteVideo" autoplay playsinline></video>
    <br>
    <button class="btn" style="background:#4CAF50" onclick="trigger('START_STREAM')">START MONITORING</button>
    <button class="btn" style="background:#f44336" onclick="trigger('STOP_STREAM')">STOP MONITORING</button>
    <button class="btn" style="background:#2196F3" onclick="document.getElementById('remoteVideo').muted = false">UNMUTE AUDIO</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, query, where, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        // --- PASTE YOUR FIREBASE CONFIG HERE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCR--mIMXA96W4CtXPq1KxYptWhKNan5Dg",
            authDomain: "webscreenlite.firebaseapp.com",
            projectId: "webscreenlite",
            storageBucket: "webscreenlite.firebasestorage.app",
            messagingSenderId: "486527120453",
            appId: "1:486527120453:web:e24b8e882b8ec7807d5f2c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const sessionId = "test_session_123";
        const sessionRef = doc(db, "sessions", sessionId);

        let pc = null;
        let remoteSet = false;
        const buffer = [];

        function initPeerConnection() {
            if (pc) pc.close();
            remoteSet = false;
            buffer.length = 0;

            pc = new RTCPeerConnection({
                iceServers: [
                    { urls: "stun:stun.l.google.com:19302" },
                    { 
                        urls: "turn:openrelay.metered.ca:443?transport=tcp", 
                        username: "openrelayproject", 
                        credential: "openrelayproject" 
                    }
                ]
            });

            pc.ontrack = (e) => {
                document.getElementById('remoteVideo').srcObject = e.streams[0];
                document.getElementById('status').innerText = "STREAMING LIVE";
                document.getElementById('status').style.color = "#4CAF50";
            };

            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    addDoc(collection(db, "sessions", sessionId, "candidates"), {
                        candidate: e.candidate.candidate, 
                        sdpMid: e.candidate.sdpMid, 
                        sdpMLineIndex: e.candidate.sdpMLineIndex, 
                        origin: "web"
                    });
                }
            };

            pc.oniceconnectionstatechange = () => {
                const s = pc.iceConnectionState;
                document.getElementById('status').innerText = "ICE: " + s.toUpperCase();
                if (s === "failed" || s === "disconnected") {
                    document.getElementById('status').style.color = "#f44336";
                }
            };
        }

        window.trigger = async (cmd) => {
            const statusBox = document.getElementById('status');
            if (cmd === 'START_STREAM') {
                statusBox.innerText = "REQUESTING NEW STREAM...";
                initPeerConnection();
                // Clear signaling and set command to START
                await updateDoc(sessionRef, { 
                    command: cmd, 
                    offer: null, 
                    answer: null 
                });
            } else {
                statusBox.innerText = "STOPPING...";
                await updateDoc(sessionRef, { command: cmd });
                if(pc) pc.close();
                document.getElementById('remoteVideo').srcObject = null;
            }
        };

        // SIGNALING: LISTEN FOR OFFER
        onSnapshot(sessionRef, async (snap) => {
            const data = snap.data();
            if (data?.offer && pc && !pc.currentRemoteDescription) {
                console.log("Offer received from Redmi");
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await updateDoc(sessionRef, { answer: { type: 'answer', sdp: answer.sdp } });
                remoteSet = true;
                while(buffer.length > 0) pc.addIceCandidate(new RTCIceCandidate(buffer.shift()));
            }
            
            if (data?.command === "IDLE") {
                document.getElementById('status').innerText = "REDMI STATUS: IDLE";
                document.getElementById('status').style.color = "#ff9800";
            }
        });

        // SIGNALING: LISTEN FOR CANDIDATES
        onSnapshot(query(collection(db, "sessions", sessionId, "candidates"), where("origin", "==", "android")), (snap) => {
            snap.docChanges().forEach(change => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    if (!remoteSet) buffer.push(data);
                    else pc.addIceCandidate(new RTCIceCandidate(data)).catch(() => {});
                }
            });
        });

        initPeerConnection();
    </script>
</body>
</html>
